            success: false
            message: Something went wrong
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Validation Error
            errorDetails:
            - path: email
              message: Invalid email
    UnauthorizedError:
      description: Unauthorized access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: Unauthorized Access
            errorDetails: Token is missing or malformed
  parameters:
    IdParameter:
      name: id
      in: path
      description: Resource unique identifier
      required: true
      schema:
        type: string
